<!doctype html><html lang='ru'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><meta name='theme-color' content='#0e0e12'><title>√ Тренажёр корней</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;height:100dvh;overflow:hidden;background:#0e0e12;color:#e8e8e0;font-family:Arial,sans-serif}button{font:inherit;touch-action:manipulation}.hidden{display:none!important}:root{--bg:#0e0e12;--s:#16161c;--b:#2a2a35;--a:#c8ff57;--m:#6d6d7e;--ok:#57ffa0;--er:#ff5757;--w:#ffb357}#start{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;overflow:auto}.logo{font:800 clamp(2.3rem,9vw,3.5rem) monospace;color:var(--a)}.sub{max-width:430px;margin:0;text-align:center;color:var(--m);line-height:1.5}.note{max-width:390px;width:100%;padding:10px;border:1px solid var(--b);border-radius:10px;background:var(--s);text-align:center;font:14px monospace}.note b{color:var(--a)}.settings{max-width:390px;width:100%;display:grid;gap:13px}.group{display:grid;gap:6px}.label{font:10px monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--m)}.row{display:flex;flex-wrap:wrap;gap:7px}.pill,.ctrl,.key{border:1px solid var(--b);background:var(--s);color:var(--m);border-radius:9px;cursor:pointer}.pill{padding:7px 13px;background:transparent;font:13px monospace}.pill.active{border-color:var(--a);background:#c8ff571e;color:var(--a)}.start{padding:13px 42px;border:0;border-radius:10px;background:var(--a);color:var(--bg);font:800 16px monospace;cursor:pointer}#game{display:none;height:100%;flex-direction:column}.top{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-bottom:1px solid var(--b)}.small-logo{color:var(--a);font:800 14px monospace}.stats{display:flex;gap:clamp(8px,2vw,18px)}.stat{text-align:right}.value{font:700 clamp(13px,2.4vw,17px) monospace}.name{font-size:9px;color:var(--m);text-transform:uppercase}.body{flex:1;min-height:0;display:flex;flex-direction:column}.problem{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:10px;flex-shrink:0}.ringbox{position:relative;width:clamp(125px,25vw,185px);height:clamp(125px,25vw,185px);display:grid;place-items:center}.ring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}circle{fill:none;stroke-width:3}.track{stroke:var(--b)}.fill{stroke:var(--a);stroke-linecap:round}.fill.warn{stroke:var(--w)}.fill.danger{stroke:var(--er)}.ptype{text-align:center;color:var(--m);font:10px monospace;text-transform:uppercase;letter-spacing:.08em}.expr{display:flex;align-items:baseline;justify-content:center;gap:3px;font-family:monospace}.sign{color:var(--m);font-size:25px}.num{font-size:clamp(27px,5vw,44px);font-weight:800;white-space:nowrap}.pause-layer{position:absolute;inset:0;display:none;place-items:center;border-radius:50%;background:#0e0e12c9;color:var(--w);font:14px monospace;text-transform:uppercase}.pause-layer.on{display:grid}.answer{width:min(260px,100%);min-height:54px;display:grid;place-items:center;border:1px solid var(--b);border-radius:10px;background:var(--s);font:700 31px monospace}.answer.focus{border-color:var(--a);box-shadow:0 0 0 3px #c8ff571e}.answer.good{border-color:var(--ok);color:var(--ok)}.answer.bad{border-color:var(--er);color:var(--er)}.placeholder{color:var(--m)}.feedback{min-height:18px;text-align:center;color:var(--m);font:13px monospace}.feedback.good{color:var(--ok)}.feedback.bad{color:var(--er)}.feedback.time{color:var(--w)}.controls{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;gap:7px;padding:8px 10px;overflow:hidden}.control-row,.auto,.pad,.history{width:min(330px,100%)}.control-row{display:flex;gap:6px}.ctrl{flex:1;padding:8px 3px;font:12px monospace}.ctrl.paused{border-color:var(--w);color:var(--w)}.auto{color:var(--m);font-size:12px}.auto label{display:flex;align-items:center;gap:6px}.pad{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.key{display:grid;place-items:center;min-height:36px;color:#e8e8e0;font:700 22px monospace}.key:active{transform:scale(.94)}.zero{grid-column:1/3}.del{color:var(--m)}.ok{background:var(--a);border-color:var(--a);color:var(--bg);font-size:15px}.history{min-height:0;overflow:auto;display:flex;flex-direction:column;gap:3px}.hitem{display:flex;justify-content:space-between;gap:7px;padding:5px 8px;border-radius:6px;background:var(--s);font:11px monospace}.hbadge{padding:2px 5px;border-radius:3px}.hbadge.good{color:var(--ok);background:#57ffa01f}.hbadge.bad{color:var(--er);background:#ff57571f}.hbadge.time{color:var(--w);background:#ffb3571f}@media(orientation:landscape){.body{flex-direction:row}.problem{width:38%;border-right:1px solid var(--b)}.ringbox{width:clamp(105px,18vh,160px);height:clamp(105px,18vh,160px)}.key{min-height:28px}}@media(max-height:620px) and (orientation:portrait){.ringbox{width:105px;height:105px}.history{display:none}}
</style></head><body>
<section id='start'><div class='logo'>√ ?</div><p class='sub'>Тренажёр быстрого извлечения квадратных и кубических корней из полных квадратов и кубов.</p><div class='note'>Все ответы — <b>двузначные числа от 10 до 99</b>.</div><div class='settings'><div class='group'><div class='label'>тип корня</div><div class='row'><button class='pill active' data-group='degree' data-val='2'>√ квадратный</button><button class='pill' data-group='degree' data-val='3'>∛ кубический</button><button class='pill' data-group='degree' data-val='both'>оба</button></div></div><div class='group'><div class='label'>лимит времени</div><div class='row'><button class='pill active' data-group='time' data-val='15'>15 с</button><button class='pill' data-group='time' data-val='20'>20 с</button><button class='pill' data-group='time' data-val='30'>30 с</button><button class='pill' data-group='time' data-val='0'>∞</button></div></div></div><button class='start' id='begin'>Начать</button></section>
<section id='game'><header class='top'><div class='small-logo'>√ root.train</div><div class='stats'><div class='stat'><div class='value' id='score'>0</div><div class='name'>очки</div></div><div class='stat'><div class='value' id='streak'>0</div><div class='name'>серия</div></div><div class='stat'><div class='value' id='acc'>—</div><div class='name'>точность</div></div><div class='stat'><div class='value' id='avg'>—</div><div class='name'>сред.вр.</div></div></div></header><main class='body'><section class='problem'><div class='ringbox'><svg class='ring' viewBox='0 0 200 200'><circle class='track' cx='100' cy='100' r='94'/><circle class='fill' id='ring' cx='100' cy='100' r='94'/></svg><div><div class='ptype' id='ptype'>квадратный корень</div><div class='expr'><span class='sign' id='sign'>√</span><span class='num' id='num'>—</span></div></div><div class='pause-layer' id='pause-layer'>пауза</div></div><div class='answer focus' id='answer'><span class='placeholder' id='placeholder'>?</span><span id='typed'></span></div><div class='feedback' id='feedback'></div></section><section class='controls'><div class='control-row'><button class='ctrl' id='pause'>⏸ Пауза</button><button class='ctrl' id='restart'>↺ Заново</button><button class='ctrl' id='stop'>■ Стоп</button></div><div class='auto'><label><input type='checkbox' id='auto' checked>авто-отправка после двух цифр</label></div><div class='pad' id='pad'><button class='key' data-d='7'>7</button><button class='key' data-d='8'>8</button><button class='key' data-d='9'>9</button><button class='key' data-d='4'>4</button><button class='key' data-d='5'>5</button><button class='key' data-d='6'>6</button><button class='key' data-d='1'>1</button><button class='key' data-d='2'>2</button><button class='key' data-d='3'>3</button><button class='key zero' data-d='0'>0</button><button class='key del' id='del'>⌫</button><button class='key ok' id='ok'>OK</button></div><div class='history' id='history'></div></section></main></section>
<script>
'use strict';const MIN=10,MAX=99,C=2*Math.PI*94,cfg={degree:2,time:15};let score=0,streak=0,total=0,correct=0,times=[],answer=null,degree=null,radicand=null,last='',timer=null,started=0,limit=15,input='',locked=false,paused=false,elapsedBefore=0,nextTimer=null;const $=id=>document.getElementById(id),el={start:$('start'),game:$('game'),ring:$('ring'),num:$('num'),ptype:$('ptype'),sign:$('sign'),ans:$('answer'),ph:$('placeholder'),typed:$('typed'),fb:$('feedback'),layer:$('pause-layer'),pad:$('pad'),history:$('history'),auto:$('auto'),pause:$('pause')};el.ring.style.strokeDasharray=C;function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1))}function chooseDegree(){return cfg.degree==='both'?(Math.random()<.5?2:3):cfg.degree}function ring(f){f=Math.max(0,Math.min(1,f));el.ring.style.strokeDashoffset=C*(1-f);el.ring.classList.remove('warn','danger');if(f<.25)el.ring.classList.add('danger');else if(f<.5)el.ring.classList.add('warn')}function render(){el.ph.style.display=input?'none':'';el.typed.textContent=input}function feedback(s,cls=''){el.fb.textContent=s;el.fb.className='feedback'+(cls?' '+cls:'')}function makeProblem(){let key;do{degree=chooseDegree();answer=rnd(MIN,MAX);radicand=degree===2?answer**2:answer**3;key=degree+':'+answer}while(key===last);last=key;el.num.textContent=radicand.toLocaleString('ru-RU');el.ptype.textContent=degree===2?'квадратный корень':'кубический корень';el.sign.textContent=degree===2?'√':'∛'}function elapsed(){return elapsedBefore+(started?(performance.now()-started)/1000:0)}function startClock(){clearInterval(timer);limit=cfg.time;elapsedBefore=0;started=performance.now();ring(1);if(limit)timer=setInterval(tick,50)}function tick(){const f=1-elapsed()/limit;ring(f);if(f<=0){clearInterval(timer);timeout()}}function stopClock(){clearInterval(timer);const e=elapsed();started=0;return e}function clearNext(){if(nextTimer){clearTimeout(nextTimer);nextTimer=null}}function later(ms){clearNext();nextTimer=setTimeout(()=>{nextTimer=null;next()},ms)}function digit(d){if(locked||paused||input.length>=2||(input===''&&d==='0'))return;input+=d;render();if(el.auto.checked&&input.length===2)setTimeout(submit,80)}function submit(){if(locked||paused||input.length!==2)return;const n=parseInt(input,10);if(n>=MIN&&n<=MAX)handle(n)}function togglePause(){if(locked||answer===null)return;paused=!paused;if(paused){elapsedBefore=elapsed();started=0;clearInterval(timer);el.pause.textContent='▶ Продолжить';el.pause.classList.add('paused');el.layer.classList.add('on');el.pad.style.opacity=.3;el.ans.style.opacity=.3}else{started=performance.now();if(limit)timer=setInterval(tick,50);el.pause.textContent='⏸ Пауза';el.pause.classList.remove('paused');el.layer.classList.remove('on');el.pad.style.opacity='';el.ans.style.opacity=''}}function next(){input='';locked=false;paused=false;render();el.ans.className='answer focus';el.ans.style.opacity='';el.pad.style.opacity='';el.layer.classList.remove('on');el.pause.textContent='⏸ Пауза';el.pause.classList.remove('paused');feedback('');makeProblem();startClock()}function handle(n){if(answer===null||locked)return;locked=true;const e=stopClock(),good=n===answer;total++;el.ans.classList.remove('focus');if(good){correct++;streak++;const bonus=limit?Math.round(Math.max(0,(limit-e)/limit)*10):0,gain=10+bonus+Math.min(streak-1,5);score+=gain;el.ans.classList.add('good');feedback(`✓ верно! +${gain} очков (${e.toFixed(1)} с)`,'good');times.push(e);addHistory('good',n,e)}else{streak=0;el.ans.classList.add('bad');feedback(`✗ неверно — ответ: ${answer}`,'bad');times.push(e);addHistory('bad',n,e)}stats();later(1200)}function timeout(){if(answer===null||locked)return;locked=true;started=0;total++;streak=0;el.ans.classList.remove('focus');feedback(`⏱ время! ответ: ${answer}`,'time');addHistory('time',null,limit);stats();later(1400)}function addHistory(status,user,e){const item=document.createElement('div');item.className='hitem';const left=document.createElement('span');left.textContent=(degree===2?'√':'∛')+radicand.toLocaleString('ru-RU')+(status==='bad'?` — вы: ${user}, отв: ${answer}`:'');const right=document.createElement('span');right.className='hbadge '+status;right.textContent=(status==='good'?'верно':status==='bad'?'ошибка':'время')+` ${e.toFixed(1)}с`;item.append(left,right);el.history.prepend(item);while(el.history.children.length>10)el.history.lastElementChild.remove()}function stats(){$('score').textContent=score;$('streak').textContent=streak;$('acc').textContent=total?Math.round(correct/total*100)+'%':'—';$('avg').textContent=times.length?(times.reduce((a,b)=>a+b,0)/times.length).toFixed(1)+'с':'—'}function reset(){score=streak=total=correct=0;times=[];last='';stats();el.history.replaceChildren()}function stopGame(){clearInterval(timer);clearNext();answer=degree=radicand=null;started=0;input='';locked=paused=false;render();el.ans.className='answer';el.num.textContent='—';el.layer.classList.remove('on');ring(0);feedback('');reset();el.game.style.display='none';el.start.classList.remove('hidden')}document.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{const g=b.dataset.group;document.querySelectorAll(`.pill[data-group='${g}']`).forEach(x=>x.classList.remove('active'));b.classList.add('active');cfg[g]=b.dataset.val==='both'?'both':+b.dataset.val});el.pad.onclick=e=>{const b=e.target.closest('[data-d]');if(b)digit(b.dataset.d)};$('del').onclick=()=>{if(!locked&&!paused){input=input.slice(0,-1);render()}};$('ok').onclick=submit;document.onkeydown=e=>{if(el.game.style.display==='none')return;if(e.key==='p'||e.key==='P'||e.key===' '){e.preventDefault();togglePause();return}if(locked||paused)return;if(/^\d$/.test(e.key))digit(e.key);else if(e.key==='Backspace'){input=input.slice(0,-1);render()}else if(e.key==='Enter')submit();else if(e.key==='Escape')stopGame()};$('begin').onclick=()=>{el.start.classList.add('hidden');el.game.style.display='flex';reset();next()};el.pause.onclick=togglePause;$('restart').onclick=()=>{clearInterval(timer);clearNext();paused=false;reset();next()};$('stop').onclick=stopGame;
</script></body></html>
