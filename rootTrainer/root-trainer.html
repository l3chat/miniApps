<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0e0e12"><title>√ Тренажёр корней</title><style>
*{box-sizing:border-box}:root{--bg:#0e0e12;--s:#16161c;--b:#2a2a35;--a:#c8ff57;--m:#6d6d7e;--ok:#57ffa0;--er:#ff5757;--w:#ffb357;--hr:4}html,body{margin:0;width:100%;height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:#e8e8e0;font-family:Arial,sans-serif}button{font:inherit;touch-action:manipulation}.hide{display:none!important}#start{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;overflow:auto}.logo{color:var(--a);font:800 clamp(2.3rem,9vw,3.5rem) monospace}.sub{max-width:430px;margin:0;color:var(--m);line-height:1.5;text-align:center}.note{width:100%;max-width:390px;padding:10px;border:1px solid var(--b);border-radius:10px;background:var(--s);text-align:center;font:14px monospace}.note b{color:var(--a)}.settings{width:100%;max-width:390px;display:grid;gap:13px}.group{display:grid;gap:6px}.label{color:var(--m);font:10px monospace;letter-spacing:.1em;text-transform:uppercase}.row{display:flex;flex-wrap:wrap;gap:7px}.pill,.ctrl,.key{border:1px solid var(--b);border-radius:9px;background:var(--s);color:var(--m);cursor:pointer}.pill{padding:7px 13px;background:transparent;font:13px monospace}.pill.on{border-color:var(--a);background:#c8ff571e;color:var(--a)}.start{padding:13px 42px;border:0;border-radius:10px;background:var(--a);color:var(--bg);cursor:pointer;font:800 16px monospace}#game{display:none;height:100%;flex-direction:column}.top{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-bottom:1px solid var(--b);flex:0 0 auto}.small{color:var(--a);font:800 14px monospace}.stats{display:flex;gap:clamp(8px,2vw,18px)}.stat{text-align:right}.val{font:700 clamp(13px,2.4vw,17px) monospace}.name{color:var(--m);font-size:9px;text-transform:uppercase}.body{flex:1;min-height:0;display:flex;flex-direction:column}.problem{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:10px;flex:0 0 auto}.ringbox{position:relative;width:clamp(125px,25vw,185px);height:clamp(125px,25vw,185px);display:grid;place-items:center}.ring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}circle{fill:none;stroke-width:3}.track{stroke:var(--b)}.fill{stroke:var(--a);stroke-linecap:round}.fill.warn{stroke:var(--w)}.fill.danger{stroke:var(--er)}.ptype{color:var(--m);font:10px monospace;letter-spacing:.08em;text-align:center;text-transform:uppercase}.expr{display:flex;align-items:baseline;justify-content:center;gap:3px;font-family:monospace}.sign{color:var(--m);font-size:25px}.num{font-size:clamp(27px,5vw,44px);font-weight:800;white-space:nowrap}.pause-layer{position:absolute;inset:0;display:none;place-items:center;border-radius:50%;background:#0e0e12c9;color:var(--w);font:14px monospace;text-transform:uppercase}.pause-layer.on{display:grid}.answer{width:min(260px,100%);min-height:54px;display:grid;place-items:center;border:1px solid var(--b);border-radius:10px;background:var(--s);font:700 31px monospace}.answer.focus{border-color:var(--a);box-shadow:0 0 0 3px #c8ff571e}.answer.good{border-color:var(--ok);color:var(--ok)}.answer.bad{border-color:var(--er);color:var(--er)}.placeholder{color:var(--m)}.feedback{min-height:18px;color:var(--m);font:13px monospace;text-align:center}.feedback.good{color:var(--ok)}.feedback.bad{color:var(--er)}.feedback.time{color:var(--w)}.controls{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;gap:7px;padding:8px 10px;overflow:hidden}.control-row,.auto,.pad,.history{width:min(330px,100%)}.control-row{display:flex;gap:6px;flex:0 0 auto}.ctrl{flex:1;padding:8px 3px;font:12px monospace}.ctrl.paused{border-color:var(--w);color:var(--w)}.auto{color:var(--m);font-size:12px;flex:0 0 auto}.auto label{display:flex;align-items:center;gap:6px}.pad{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.key{min-height:28px;display:grid;place-items:center;color:#e8e8e0;font:700 22px monospace}.key:active{transform:scale(.94)}.zero{grid-column:1/3}.del{color:var(--m)}.ok{border-color:var(--a);background:var(--a);color:var(--bg);font-size:15px}.history{flex:0 0 calc(var(--hr)*28px + (var(--hr) - 1)*3px);height:calc(var(--hr)*28px + (var(--hr) - 1)*3px);display:flex;flex-direction:column;gap:3px;overflow:hidden}.hitem{height:28px;flex:0 0 28px;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:7px;padding:4px 8px;border-radius:6px;background:var(--s);font:11px monospace}.hexpr{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.hbadge{flex:0 0 auto;padding:2px 5px;border-radius:3px}.hbadge.good{color:var(--ok);background:#57ffa01f}.hbadge.bad{color:var(--er);background:#ff57571f}.hbadge.time{color:var(--w);background:#ffb3571f}.hitem.empty{border:1px solid #2a2a35a6;background:#16161c73}@media(orientation:landscape){.body{flex-direction:row}.problem{width:38%;border-right:1px solid var(--b)}.ringbox{width:clamp(105px,18vh,160px);height:clamp(105px,18vh,160px)}.key{min-height:25px}}@media(max-height:560px) and (orientation:portrait){.ringbox{width:100px;height:100px}.problem{gap:5px;padding:5px 8px}.answer{min-height:42px;font-size:25px}.controls{gap:4px;padding-top:4px}.ctrl{padding:5px 2px}}
</style></head><body><section id="start"><div class="logo">√ ?</div><p class="sub">Тренажёр быстрого извлечения квадратных и кубических корней из полных квадратов и кубов.</p><div class="note">Все ответы — <b>двузначные числа от 10 до 99</b>.</div><div class="settings"><div class="group"><div class="label">тип корня</div><div class="row"><button class="pill on" data-g="degree" data-v="2">√ квадратный</button><button class="pill" data-g="degree" data-v="3">∛ кубический</button><button class="pill" data-g="degree" data-v="both">оба</button></div></div><div class="group"><div class="label">лимит времени</div><div class="row"><button class="pill on" data-g="time" data-v="15">15 с</button><button class="pill" data-g="time" data-v="20">20 с</button><button class="pill" data-g="time" data-v="30">30 с</button><button class="pill" data-g="time" data-v="0">∞</button></div></div></div><button class="start" id="begin">Начать</button></section><section id="game"><header class="top"><div class="small">√ root.train</div><div class="stats"><div class="stat"><div class="val" id="score">0</div><div class="name">очки</div></div><div class="stat"><div class="val" id="streak">0</div><div class="name">серия</div></div><div class="stat"><div class="val" id="acc">—</div><div class="name">точность</div></div><div class="stat"><div class="val" id="avg">—</div><div class="name">сред.вр.</div></div></div></header><main class="body"><section class="problem"><div class="ringbox"><svg class="ring" viewBox="0 0 200 200"><circle class="track" cx="100" cy="100" r="94"></circle><circle class="fill" id="ring" cx="100" cy="100" r="94"></circle></svg><div><div class="ptype" id="ptype">квадратный корень</div><div class="expr"><span class="sign" id="sign">√</span><span class="num" id="num">—</span></div></div><div class="pause-layer" id="layer">пауза</div></div><div class="answer focus" id="answer"><span class="placeholder" id="ph">?</span><span id="typed"></span></div><div class="feedback" id="fb"></div></section><section class="controls"><div class="control-row"><button class="ctrl" id="pause">⏸ Пауза</button><button class="ctrl" id="restart">↺ Заново</button><button class="ctrl" id="stop">■ Стоп</button></div><div class="auto"><label><input type="checkbox" id="auto" checked>авто-отправка после двух цифр</label></div><div class="pad" id="pad"><button class="key" data-d="7">7</button><button class="key" data-d="8">8</button><button class="key" data-d="9">9</button><button class="key" data-d="4">4</button><button class="key" data-d="5">5</button><button class="key" data-d="6">6</button><button class="key" data-d="1">1</button><button class="key" data-d="2">2</button><button class="key" data-d="3">3</button><button class="key zero" data-d="0">0</button><button class="key del" id="del">⌫</button><button class="key ok" id="ok">OK</button></div><div class="history" id="history"></div></section></main></section><script>
'use strict';const MIN=10,MAX=99,C=2*Math.PI*94,cfg={degree:2,time:15};let score=0,streak=0,total=0,correct=0,times=[],ans=null,deg=null,rad=null,last='',timer=null,started=0,limit=15,input='',locked=false,paused=false,before=0,nextTimer=null,hcap=4,hdata=[];const $=id=>document.getElementById(id),e={start:$('start'),game:$('game'),ring:$('ring'),num:$('num'),ptype:$('ptype'),sign:$('sign'),answer:$('answer'),ph:$('ph'),typed:$('typed'),fb:$('fb'),layer:$('layer'),pad:$('pad'),history:$('history'),auto:$('auto'),pause:$('pause')};e.ring.style.strokeDasharray=C;function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1))}function degree(){return cfg.degree==='both'?(Math.random()<.5?2:3):cfg.degree}function setRing(f){f=Math.max(0,Math.min(1,f));e.ring.style.strokeDashoffset=C*(1-f);e.ring.classList.remove('warn','danger');if(f<.25)e.ring.classList.add('danger');else if(f<.5)e.ring.classList.add('warn')}function render(){e.ph.style.display=input?'none':'';e.typed.textContent=input}function feedback(s,c=''){e.fb.textContent=s;e.fb.className='feedback'+(c?' '+c:'')}function makeProblem(){let key;do{deg=degree();ans=rnd(MIN,MAX);rad=deg===2?ans**2:ans**3;key=deg+':'+ans}while(key===last);last=key;e.num.textContent=rad.toLocaleString('ru-RU');e.ptype.textContent=deg===2?'квадратный корень':'кубический корень';e.sign.textContent=deg===2?'√':'∛'}function elapsed(){return before+(started?(performance.now()-started)/1000:0)}function startClock(){clearInterval(timer);limit=cfg.time;before=0;started=performance.now();setRing(1);if(limit)timer=setInterval(tick,50)}function tick(){const f=1-elapsed()/limit;setRing(f);if(f<=0){clearInterval(timer);timeout()}}function stopClock(){clearInterval(timer);const x=elapsed();started=0;return x}function clearNext(){if(nextTimer){clearTimeout(nextTimer);nextTimer=null}}function later(ms){clearNext();nextTimer=setTimeout(()=>{nextTimer=null;next()},ms)}function digit(d){if(locked||paused||input.length>=2||(input===''&&d==='0'))return;input+=d;render();if(e.auto.checked&&input.length===2)setTimeout(submit,80)}function submit(){if(locked||paused||input.length!==2)return;const n=parseInt(input,10);if(n>=MIN&&n<=MAX)handle(n)}function togglePause(){if(locked||ans===null)return;paused=!paused;if(paused){before=elapsed();started=0;clearInterval(timer);e.pause.textContent='▶ Продолжить';e.pause.classList.add('paused');e.layer.classList.add('on');e.pad.style.opacity=.3;e.answer.style.opacity=.3}else{started=performance.now();if(limit)timer=setInterval(tick,50);e.pause.textContent='⏸ Пауза';e.pause.classList.remove('paused');e.layer.classList.remove('on');e.pad.style.opacity='';e.answer.style.opacity=''}}function next(){input='';locked=false;paused=false;render();e.answer.className='answer focus';e.answer.style.opacity='';e.pad.style.opacity='';e.layer.classList.remove('on');e.pause.textContent='⏸ Пауза';e.pause.classList.remove('paused');feedback('');makeProblem();startClock()}function handle(n){if(ans===null||locked)return;locked=true;const x=stopClock(),good=n===ans;total++;e.answer.classList.remove('focus');if(good){correct++;streak++;const bonus=limit?Math.round(Math.max(0,(limit-x)/limit)*10):0,gain=10+bonus+Math.min(streak-1,5);score+=gain;e.answer.classList.add('good');feedback(`✓ верно! +${gain} очков (${x.toFixed(1)} с)`,'good');times.push(x);addHistory('good',n,x)}else{streak=0;e.answer.classList.add('bad');feedback(`✗ неверно — ответ: ${ans}`,'bad');times.push(x);addHistory('bad',n,x)}stats();later(1200)}function timeout(){if(ans===null||locked)return;locked=true;started=0;total++;streak=0;e.answer.classList.remove('focus');feedback(`⏱ время! ответ: ${ans}`,'time');addHistory('time',null,limit);stats();later(1400)}function capacity(){const w=innerWidth,h=innerHeight;if(w>h)return h<420?3:h<600?5:7;return h<560?2:h<700?3:h<900?4:h<1100?5:6}function updateCapacity(){const n=capacity();if(n===hcap&&e.history.children.length)return;hcap=n;document.documentElement.style.setProperty('--hr',n);renderHistory()}function addHistory(status,user,x){hdata.unshift({status,user,x,deg,rad,ans});hdata=hdata.slice(0,20);renderHistory()}function renderHistory(){e.history.replaceChildren();hdata.slice(0,hcap).forEach(h=>{const item=document.createElement('div'),left=document.createElement('span'),badge=document.createElement('span');item.className='hitem';left.className='hexpr';left.textContent=(h.deg===2?'√':'∛')+h.rad.toLocaleString('ru-RU')+(h.status==='bad'?` — вы: ${h.user}, отв: ${h.ans}`:'');badge.className='hbadge '+h.status;badge.textContent=(h.status==='good'?'верно':h.status==='bad'?'ошибка':'время')+` ${h.x.toFixed(1)}с`;item.append(left,badge);e.history.append(item)});for(let i=Math.min(hdata.length,hcap);i<hcap;i++){const item=document.createElement('div');item.className='hitem empty';item.innerHTML='&nbsp;';item.setAttribute('aria-hidden','true');e.history.append(item)}}function stats(){$('score').textContent=score;$('streak').textContent=streak;$('acc').textContent=total?Math.round(correct/total*100)+'%':'—';$('avg').textContent=times.length?(times.reduce((a,b)=>a+b,0)/times.length).toFixed(1)+'с':'—'}function reset(){score=streak=total=correct=0;times=[];hdata=[];stats();updateCapacity();renderHistory()}document.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{const g=b.dataset.g;document.querySelectorAll(`.pill[data-g="${g}"]`).forEach(x=>x.classList.remove('on'));b.classList.add('on');const v=b.dataset.v;if(g==='degree')cfg.degree=v==='both'?'both':+v;else cfg.time=+v});e.pad.onclick=x=>{const b=x.target.closest('[data-d]');if(b)digit(b.dataset.d)};$('del').onclick=()=>{if(!locked&&!paused){input=input.slice(0,-1);render()}};$('ok').onclick=submit;e.pause.onclick=togglePause;$('begin').onclick=()=>{e.start.classList.add('hide');e.game.style.display='flex';reset();next()};$('restart').onclick=()=>{clearInterval(timer);clearNext();paused=false;reset();next()};$('stop').onclick=()=>{clearInterval(timer);clearNext();ans=null;input='';locked=paused=false;started=0;render();e.answer.className='answer';e.num.textContent='—';e.layer.classList.remove('on');setRing(0);feedback('');reset();e.game.style.display='none';e.start.classList.remove('hide')};document.onkeydown=x=>{if(e.game.style.display!=='flex')return;if(x.key==='p'||x.key==='P'||x.key===' '){x.preventDefault();togglePause();return}if(locked||paused)return;if(/^[0-9]$/.test(x.key))digit(x.key);else if(x.key==='Backspace'){input=input.slice(0,-1);render()}else if(x.key==='Enter')submit()};let rt=null;onresize=()=>{clearTimeout(rt);rt=setTimeout(updateCapacity,100)};updateCapacity();
</script></body></html>
