<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Apps</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3ee;
        --panel: #ffffff;
        --ink: #17211c;
        --muted: #68766f;
        --line: #d7e0d9;
        --accent: #176b5b;
        --accent-strong: #0f4c41;
        --shadow: 0 18px 48px rgba(20, 31, 25, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        background:
          linear-gradient(120deg, rgba(23, 107, 91, 0.13), transparent 34%),
          linear-gradient(300deg, rgba(189, 89, 76, 0.11), transparent 36%),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 900px);
        margin: 0 auto;
        padding: clamp(20px, 5vw, 48px);
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 3rem;
        line-height: 1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-weight: 650;
      }

      .app-list {
        display: grid;
        gap: 14px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .app-card {
        display: grid;
        gap: 8px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow);
      }

      .app-card a {
        width: fit-content;
        color: var(--accent);
        font-size: 1.35rem;
        font-weight: 850;
        text-decoration: none;
      }

      .app-card a:hover {
        color: var(--accent-strong);
        text-decoration: underline;
      }

      .app-card span {
        color: var(--muted);
        line-height: 1.45;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 2.2rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Mini Apps</h1>
        <p>A small collection of browser-based tools.</p>
      </header>

      <ul class="app-list">
        <li class="app-card">
          <a href="schulte/index.html">Schulte Table</a>
          <span>Responsive Schulte table timer with standard and center-dot variants.</span>
        </li>
      </ul>
    </main>
  </body>
</html>
